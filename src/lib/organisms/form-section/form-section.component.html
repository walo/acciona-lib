<section class="ac-form-section">
  <header class="ac-form-section__header">
    <h3>{{ title }}</h3>
    <p *ngIf="description">{{ description }}</p>
    <div class="ac-form-section__actions">
      <ng-content select="[slot=actions]"></ng-content>
    </div>
  </header>
  <div class="ac-form-section__content">
    <ng-content></ng-content>
  </div>
</section>
