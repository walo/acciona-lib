<div class="ac-password-field">
  <ac-input
    [type]="show ? 'text' : 'password'"
    [placeholder]="placeholder"
    [value]="value"
    (valueChange)="onValueChange($event)"
  ></ac-input>
  <button type="button" class="ac-password-field__toggle" (click)="toggle()" aria-label="Toggle password">
    <ac-icon [name]="show ? 'eye-off' : 'eye'"></ac-icon>
  </button>
</div>
